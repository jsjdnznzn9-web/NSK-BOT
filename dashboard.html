<meta name='viewport' content='width=device-width, initial-scale=1'
<title> </title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">

<style>
:root{
--neon-cyan:#00f2ff;
--neon-blue:#0062ff;
--dark-core:#010208;
--border-glow:rgba(0,242,255,.3);
}

body,html{
margin:0;
padding:0;
width:100%;
height:100%;
background:var(--dark-core);
color:#fff;
font-family:'Orbitron',sans-serif;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

#matrixCanvas{
position:fixed;
top:0;left:0;
z-index:1;
opacity:.15;
}

/* TOP BAR */
.top-nav{
position:fixed;
top:0;width:100%;
padding:10px 20px;
background:rgba(0,0,0,.8);
border-bottom:1px solid var(--border-glow);
font-family:'JetBrains Mono';
font-size:11px;
display:flex;
justify-content:space-between;
z-index:100;
box-sizing:border-box;
color:var(--neon-cyan);
}

/* MAIN CARD */
.main-frame{
position:relative;
z-index:10;
width:420px;
background:rgba(2,6,23,.85);
backdrop-filter:blur(25px);
border:1px solid var(--border-glow);
padding:40px;
box-shadow:0 0 40px rgba(0,0,0,1),
inset 0 0 15px rgba(0,242,255,.1);
clip-path:polygon(10% 0,100% 0,100% 90%,90% 100%,0 100%,0 10%);
}

.title-section h1{
margin:0;
font-size:28px;
letter-spacing:5px;
color:var(--neon-cyan);
}

.title-section p{
font-family:'JetBrains Mono';
font-size:10px;
color:#64748b;
margin:5px 0;
}

.field-container{margin-bottom:25px;}

label{
display:block;
font-size:10px;
color:#94a3b8;
margin-bottom:8px;
letter-spacing:2px;
}

input{
width:100%;
background:rgba(0,0,0,.6);
border:1px solid #1e293b;
padding:15px;
color:var(--neon-cyan);
font-family:'JetBrains Mono';
box-sizing:border-box;
}

input:focus{
outline:none;
border-color:var(--neon-cyan);
box-shadow:0 0 15px rgba(0,242,255,.2);
}

/* SERVER GRID */
.server-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.server-node{
padding:10px;
background:rgba(15,23,42,.6);
border:1px solid #1e293b;
font-size:10px;
text-align:center;
cursor:pointer;
font-family:'JetBrains Mono';
}

.server-node:hover,.server-node.active{
background:rgba(0,242,255,.1);
border-color:var(--neon-cyan);
color:var(--neon-cyan);
text-shadow:0 0 8px var(--neon-cyan);
}

/* BUTTON */
.btn-execute{
width:100%;
margin-top:30px;
padding:18px;
background:transparent;
border:1px solid var(--neon-cyan);
color:var(--neon-cyan);
font-weight:900;
letter-spacing:3px;
cursor:pointer;
clip-path:polygon(0 0,90% 0,100% 30%,100% 100%,10% 100%,0 70%);
}

.btn-execute:hover{
background:var(--neon-cyan);
color:#000;
box-shadow:0 0 30px var(--neon-cyan);
}

/* TERMINAL */
#terminalOverlay{
position:fixed;
inset:0;
background:var(--dark-core);
z-index:200;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:'JetBrains Mono';
}

.terminal-monitor{
width:600px;
height:350px;
background:#000;
border:1px solid #10b981;
padding:20px;
color:#10b981;
font-size:12px;
overflow:hidden;
box-shadow:0 0 30px rgba(16,185,129,.1);
}

.scanline{
width:100%;
height:2px;
background:rgba(16,185,129,.1);
position:absolute;
animation:scan 4s linear infinite;
}

@keyframes scan{
from{top:0;}
to{top:100%;}
}
</style>
</head>

<body>

<canvas id="matrixCanvas"></canvas>

<div class="top-nav">
<div id="sys-time">SYS_TIME: 00:00:00</div>
<div>ENCRYPTION: AES-256-GCM</div>
<div id="node-status">ACTIVE_NODES: 1,942</div>
</div>

<div class="main-frame" id="uiFrame">

<div class="title-section">
<h1>GUILD GLORY</h1>
<p>SECURE INTERFACE | VERSION 4.0.2</p>
</div>

<div class="field-container">
<label>TARGET_UID_HASH</label>
<input type="text" id="uid" placeholder="0000000000" maxlength="15">
</div>

<div class="field-container">
<label>DISTRIBUTION_SERVER</label>
<div class="server-grid">
<div class="server-node" onclick="setNode(this)">IND</div>
<div class="server-node" onclick="setNode(this)">ASIA_S</div>
<div class="server-node" onclick="setNode(this)">BRAZIL_X</div>
<div class="server-node" onclick="setNode(this)">PAK</div>
<div class="server-node" onclick="setNode(this)">INDONESIA</div>
<div class="server-node" onclick="setNode(this)">MENA_S2</div>
</div>
</div>

<button class="btn-execute" onclick="launchProcess()">CONFIRM</button>

</div>

<div id="terminalOverlay">
<div style="margin-bottom:15px;letter-spacing:8px;color:#10b981;">ESTABLISHING TUNNEL</div>

<div class="terminal-monitor">
<div class="scanline"></div>
<div id="termLog"></div>
</div>
</div>

<script>

/* NODE SELECT */
let selectedNode="";
function setNode(el){
document.querySelectorAll('.server-node')
.forEach(n=>n.classList.remove('active'));
el.classList.add('active');
selectedNode=el.innerText;
}

/* ✅ PROCESS + SAVE DATA */
function launchProcess(){

const uid=document.getElementById('uid').value;

if(uid.length<8 || !selectedNode){
alert("INCOMPLETE DATA_PACKET");
return;
}

/* ⭐ SAVE DATA FOR OTHER PAGES */
localStorage.setItem("gg_uid",uid);
localStorage.setItem("gg_server",selectedNode);

document.getElementById('uiFrame').style.display='none';
document.getElementById('terminalOverlay').style.display='flex';

const logs=[
`[INFO] Target: ${uid}`,
`[INFO] Server: ${selectedNode}`,
`[WARN] Handshake bypass initiated...`,
`[INFO] Establishing Socket.io connection...`,
`[SUCCESS] Payload delivered.`,
`[DONE] Process Finished Successfully.`
];

let i=0;
const logBox=document.getElementById('termLog');

const interval=setInterval(()=>{
if(i<logs.length){
const line=document.createElement('div');
line.innerText=`> ${logs[i]}`;
logBox.appendChild(line);
i++;
}else{
clearInterval(interval);

/* REDIRECT */
setTimeout(()=>{
window.location.href="payment.html";
},2000);
}
},600);
}

/* TIME */
setInterval(()=>{
const now=new Date();
document.getElementById('sys-time').innerText=
`SYS_TIME: ${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
},1000);

</script>

</body>
</html>
